name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dash gate (hard rule)
        run: python3 scripts/check_no_dashes.py .
      - name: Ruff
        run: |
          pip install ruff
          ruff check .
      - name: clang-format
        # Best effort: clang-format output varies across major versions, so a
        # version mismatch with the local toolchain should not fail the build.
        continue-on-error: true
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find include src tests benchmarks -type f \( -name '*.cpp' -o -name '*.hpp' \
            -o -name '*.cu' -o -name '*.cuh' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  build:
    # Compile the sm_120 code without a GPU. Uses a CUDA 13 devel container to
    # match the CUDA 13 APIs the code relies on (the NVML versioned temperature
    # and clocks event queries, and cudaDeviceProp without clockRate). Warnings as
    # errors are off here because the container's host GCC differs from the
    # author's machine and its warning set differs; the zero warning gate is
    # enforced locally.
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.0.1-devel-ubuntu24.04
    steps:
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y git cmake ninja-build
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CUDA_ARCHITECTURES=120 -DCKL_WERROR=OFF
      - name: Build (nvcc codegens sm_120 without a GPU present)
        run: cmake --build build --parallel

  report:
    # Build both PDFs from the committed summary and figures. No GPU or CUDA
    # toolkit needed; this checks that the report pipeline reproduces from data.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LaTeX and plotting dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended \
            texlive-science latexmk python3-matplotlib python3-numpy
      - name: Build reports from committed data
        run: make report
